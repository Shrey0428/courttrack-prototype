<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | CourtTrack</title>
    <style>
      :root {
        --bg: #eef3fb;
        --panel: #ffffff;
        --ink: #18263a;
        --muted: #62728c;
        --line: #d6deea;
        --accent: #0f62fe;
        --danger: #b42318;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(15,98,254,.12), transparent 28%),
          linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      }
      .card {
        width: min(460px, 100%);
        background: rgba(255,255,255,.96);
        border: 1px solid rgba(214,222,234,.95);
        border-radius: 22px;
        padding: 28px;
        box-shadow: 0 24px 48px rgba(24,38,58,.1);
      }
      .brand-logo {
        display: block;
        width: 84px;
        height: 84px;
        object-fit: cover;
        border-radius: 22px;
        box-shadow: 0 14px 30px rgba(24,38,58,.14);
        margin-bottom: 18px;
      }
      .eyebrow { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
      h1 { margin: 0 0 12px; }
      p { margin: 0 0 12px; color: var(--muted); }
      label { display: block; margin: 14px 0 6px; font-size: 14px; color: var(--muted); }
      input, button {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 12px 14px;
        font: inherit;
      }
      button {
        margin-top: 18px;
        border: none;
        cursor: pointer;
        color: white;
        background: linear-gradient(135deg, #0f62fe, #0043ce);
      }
      .status { min-height: 20px; margin-top: 12px; color: var(--muted); }
      .status.error { color: var(--danger); }
    </style>
  </head>
  <body>
    <main class="card">
      <img src="/assets/logo.png" alt="Amit Gupta and Associates logo" class="brand-logo" />
      <div class="eyebrow">CourtTrack</div>
      <h1>Login required</h1>
      <p>Enter your login credentials to access the case-status dashboard.</p>

      <form id="loginForm">
        <label for="username">Username</label>
        <input id="username" autocomplete="username" required />

        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />

        <button type="submit">Login</button>
      </form>

      <div class="status" id="status"></div>
    </main>

    <script>
      const nextUrl = new URLSearchParams(window.location.search).get('next') || '/';

      async function api(url, options = {}) {
        const response = await fetch(url, {
          headers: { 'Content-Type': 'application/json' },
          ...options
        });
        const data = await response.json();
        if (!response.ok) {
          const error = new Error(data.error || 'Request failed');
          Object.assign(error, data);
          throw error;
        }
        return data;
      }

      function setStatus(message, cls = '') {
        const el = document.getElementById('status');
        el.className = `status ${cls}`.trim();
        el.textContent = message || '';
      }

      async function bootstrap() {
        try {
          const status = await api('/auth/status');
          if (status.authenticated) {
            window.location.replace(nextUrl);
          }
        } catch (_) {}
      }

      document.getElementById('loginForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        setStatus('Signing in...');

        try {
          await api('/auth/login', {
            method: 'POST',
            body: JSON.stringify({
              username: document.getElementById('username').value.trim(),
              password: document.getElementById('password').value
            })
          });
          window.location.replace(nextUrl);
        } catch (error) {
          setStatus(error.message, 'error');
        }
      });

      bootstrap();
    </script>
  </body>
</html>
