<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Case Details</title>
    <style>
      :root {
        --bg: #eef2f7;
        --panel: #ffffff;
        --ink: #132238;
        --muted: #66758f;
        --line: #d9e1ec;
        --accent: #0f62fe;
        --accent-soft: #e8f0ff;
        --success: #0c7a43;
        --danger: #b42318;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Georgia, "Times New Roman", serif; background:
        radial-gradient(circle at top left, rgba(15,98,254,.08), transparent 32%),
        linear-gradient(180deg, #f7f9fc 0%, var(--bg) 100%); color: var(--ink); }
      .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 20px 48px; }
      .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
      .brand { display:flex; align-items:center; gap:14px; }
      .brand-logo { width:66px; height:66px; object-fit:cover; border-radius:18px; box-shadow:0 14px 28px rgba(19,34,56,.12); }
      .eyebrow { letter-spacing: .08em; text-transform: uppercase; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
      h1, h2, h3 { margin: 0 0 10px; font-weight: 600; }
      p { margin: 0 0 10px; }
      .muted { color: var(--muted); }
      .grid { display: grid; grid-template-columns: 1.3fr .7fr; gap: 18px; }
      .stack { display: grid; gap: 18px; }
      .card { background: rgba(255,255,255,.94); border: 1px solid rgba(217,225,236,.9); border-radius: 18px; padding: 20px; box-shadow: 0 18px 40px rgba(29,43,70,.08); }
      .big-date { font-size: 38px; line-height: 1; margin-bottom: 10px; }
      .meta-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-top: 16px; }
      .meta { border: 1px solid var(--line); border-radius: 14px; padding: 14px; background: #fbfcfe; }
      .meta strong { display: block; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
      .toolbar { display: flex; gap: 10px; flex-wrap: wrap; }
      .section-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
      .section-head h2 { margin-bottom: 0; }
      .toggle-btn { padding: 8px 12px; border-radius: 10px; }
      button, input, textarea { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--line); font: inherit; }
      input[type="checkbox"] { width: auto; }
      textarea { min-height: 108px; resize: vertical; }
      button { width: auto; cursor: pointer; color: white; background: linear-gradient(135deg, #0f62fe, #0043ce); border: none; }
      button.secondary { background: white; color: var(--accent); border: 1px solid var(--line); }
      button.danger { background: #d92d20; }
      label { display: block; font-size: 14px; color: var(--muted); margin-bottom: 6px; }
      .form-row { display: grid; gap: 12px; }
      .status { margin-top: 12px; min-height: 20px; color: var(--muted); }
      .status.success { color: var(--success); }
      .status.error { color: var(--danger); }
      .check-row { display: flex; align-items: center; gap: 10px; color: var(--ink); margin: 0; }
      .list { display: grid; gap: 12px; }
      .item { border: 1px solid var(--line); border-radius: 14px; padding: 14px; background: #fbfcfe; }
      .item time { display: block; color: var(--muted); font-size: 13px; margin-bottom: 6px; }
      .pill { display: inline-block; padding: 4px 9px; border-radius: 999px; font-size: 12px; background: var(--accent-soft); color: var(--accent); }
      .pill.status-pending { background: #e7f8ef; color: #027a48; }
      .pill.status-disposed { background: #fdecec; color: #b42318; }
      .history-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
      .history-table th, .history-table td { border: 1px solid var(--line); padding: 8px; vertical-align: top; text-align: left; }
      .history-table th { background: #eef4ff; color: var(--ink); }
      a { color: var(--accent); }
      @media (max-width: 900px) {
        .grid, .meta-grid { grid-template-columns: 1fr; }
        .big-date { font-size: 30px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="brand">
          <img src="/assets/logo.png" alt="Amit Gupta and Associates logo" class="brand-logo" />
          <div>
            <div class="eyebrow">CourtTrack</div>
            <h1 id="pageTitle">Case details</h1>
            <p class="muted" id="pageSubtitle">Loading case data...</p>
          </div>
        </div>
        <div class="toolbar">
          <button class="secondary" id="logoutBtn" type="button">Logout</button>
          <button class="secondary" onclick="window.location.href='/'">Back to home</button>
          <button class="secondary" id="refreshBtn" type="button">Refresh case</button>
          <button class="danger" id="deleteBtn" type="button">Delete case</button>
        </div>
      </div>

      <div class="grid">
        <div class="stack">
          <section class="card">
            <div class="eyebrow">Next hearing</div>
            <div class="big-date" id="hearingDate">-</div>
            <p id="caseTitle">Loading...</p>
            <p class="muted" id="caseNumber">-</p>
            <div class="meta-grid" id="metaGrid"></div>
          </section>

          <section class="card">
            <h2>Official documents</h2>
            <p class="muted" id="documentLinks">-</p>
          </section>

          <section class="card">
            <h2>Case name</h2>
            <div class="form-row">
              <div>
                <label for="manualCaseTitle">Manual case name</label>
                <input id="manualCaseTitle" placeholder="Add a readable name for this case" />
              </div>
              <button id="saveCaseTitleBtn" type="button">Save case name</button>
            </div>
            <div class="status" id="caseTitleFeedback"></div>
          </section>

          <section class="card">
            <div class="section-head">
              <h2>Case history</h2>
              <button class="secondary toggle-btn" id="historyToggleBtn" type="button" hidden>Show more</button>
            </div>
            <div class="list" id="caseHistoryList"></div>
          </section>

          <section class="card">
            <h2>Events</h2>
            <div class="list" id="eventsList"></div>
          </section>

          <section class="card">
            <h2>Recent sync runs</h2>
            <div class="list" id="runsList"></div>
          </section>
        </div>

        <div class="stack">
          <section class="card">
            <h2>Email reminders</h2>
            <p class="muted" id="reminderStatusText">Loading reminder status...</p>
            <div class="form-row" style="margin-top: 16px;">
              <div>
                <label for="reminderEmails">Reminder emails</label>
                <textarea id="reminderEmails" placeholder="person1@example.com, person2@example.com"></textarea>
              </div>
              <label class="check-row"><input id="reminderEnabled" type="checkbox" /> Enable scheduled reminders</label>
              <div>
                <label for="reminderDaysBefore">Reminder days before hearing</label>
                <input id="reminderDaysBefore" placeholder="3, 2, 1, 0" />
              </div>
              <label class="check-row"><input id="reminderSkipDisposed" type="checkbox" /> Skip disposed cases</label>
              <button id="saveReminderBtn" type="button">Save reminder settings</button>
              <button id="testReminderBtn" class="secondary" type="button">Send test email</button>
              <button id="runReminderBtn" class="secondary" type="button">Run reminder check now</button>
              <button id="forceReminderBtn" class="secondary" type="button">Force-send reminder now</button>
            </div>
            <div class="status" id="reminderFeedback"></div>
            <div class="list" id="reminderSweepResults" style="margin-top: 14px;"></div>
          </section>

          <section class="card">
            <h2>Reminder history</h2>
            <div class="list" id="reminderHistory"></div>
          </section>
        </div>
      </div>
    </div>

    <script>
      const caseId = new URLSearchParams(window.location.search).get('id');
      let currentCase = null;
      let reminderStatus = null;
      let highCourtHistoryExpanded = false;
      const DEFAULT_REMINDER_EMAIL = 'info@amitguptaadvocate.com';

      async function api(url, options = {}) {
        const response = await fetch(url, {
          headers: { 'Content-Type': 'application/json' },
          ...options
        });
        if (response.status === 401) {
          window.location.href = `/login.html?next=${encodeURIComponent(window.location.pathname + window.location.search)}`;
          throw new Error('Authentication required.');
        }
        const data = await response.json();
        if (!response.ok) {
          const error = new Error(data.error || data.message || 'Request failed');
          Object.assign(error, data);
          throw error;
        }
        return data;
      }

      function setReminderFeedback(message, cls = '') {
        const el = document.getElementById('reminderFeedback');
        el.className = `status ${cls}`.trim();
        el.textContent = message || '';
      }

      function setCaseTitleFeedback(message, cls = '') {
        const el = document.getElementById('caseTitleFeedback');
        el.className = `status ${cls}`.trim();
        el.textContent = message || '';
      }

      function renderSweepResults(results) {
        const el = document.getElementById('reminderSweepResults');
        if (!results || !results.length) {
          el.innerHTML = '';
          return;
        }

        el.innerHTML = '';
        for (const item of results) {
          const div = document.createElement('div');
          div.className = 'item';
          div.innerHTML = `
            <div><strong>${escapeHtml(item.caseNumber || item.caseId || 'Case')}</strong></div>
            <p class="muted">${item.sent ? `Email sent to ${escapeHtml(item.email || '-')}${item.forced ? ' (forced)' : ''}` : escapeHtml(formatSkippedReason(item))}</p>
          `;
          el.appendChild(div);
        }
      }

      function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
      }

      function statusClass(status) {
        const value = String(status || '').toLowerCase();
        if (value.includes('disposed')) return 'status-disposed';
        if (value.includes('pending')) return 'status-pending';
        return '';
      }

      function renderDocumentLinks(caseData) {
        const links = [];
        const directOrderUrls = getDirectOrderUrls(caseData);
        if (directOrderUrls.length) {
          directOrderUrls.forEach((url, index) => links.push(`<a href="${url}" target="_blank" rel="noopener noreferrer">Order PDF${directOrderUrls.length > 1 ? ' ' + (index + 1) : ''}</a>`));
        } else if (
          isUsableDocumentUrl(caseData?.latestOrdersUrl || caseData?.snapshots?.[0]?.payload?.ordersUrl) &&
          (caseData?.provider !== 'districtCourtCnr' || /^\/api\/documents\//.test(caseData?.latestOrdersUrl || caseData?.snapshots?.[0]?.payload?.ordersUrl || ''))
        ) {
          const url = caseData.latestOrdersUrl || caseData.snapshots[0].payload.ordersUrl;
          links.push(`<a href="${url}" target="_blank" rel="noopener noreferrer">Orders</a>`);
        }
        if (isUsableDocumentUrl(caseData?.latestJudgmentsUrl || caseData?.snapshots?.[0]?.payload?.judgmentsUrl)) {
          const url = caseData.latestJudgmentsUrl || caseData.snapshots[0].payload.judgmentsUrl;
          links.push(`<a href="${url}" target="_blank" rel="noopener noreferrer">Judgments</a>`);
        }
        if (isUsableDocumentUrl(caseData?.latestFilingsUrl || caseData?.snapshots?.[0]?.payload?.filingsUrl || caseData?.latestCaseHistoryUrl)) {
          const url = caseData.latestFilingsUrl || caseData.snapshots?.[0]?.payload?.filingsUrl || caseData.latestCaseHistoryUrl;
          links.push(`<a href="${url}" target="_blank" rel="noopener noreferrer">Filings</a>`);
        }
        if (isUsableDocumentUrl(caseData?.latestListingsUrl || caseData?.snapshots?.[0]?.payload?.listingsUrl || caseData?.latestCaseHistoryUrl)) {
          const url = caseData.latestListingsUrl || caseData.snapshots?.[0]?.payload?.listingsUrl || caseData.latestCaseHistoryUrl;
          links.push(`<a href="${url}" target="_blank" rel="noopener noreferrer">Listings</a>`);
        }
        return links.length ? links.join(' | ') : '-';
      }

      function getDirectOrderUrls(caseData) {
        const history = caseData?.latestCaseHistory || caseData?.snapshots?.[0]?.payload?.caseHistory || {};
        const orderLinks = Array.isArray(history.orders) ? history.orders.map((order) => getDistrictOrderLink(caseData, order)).filter(isUsableDocumentUrl) : [];
        const rawLinks = Array.isArray(history.rawTables)
          ? history.rawTables.flatMap((table) => table.rows || []).flatMap((row) => row.cells || []).flatMap((cell) => getDistrictCellLinks(caseData, cell)).filter((url) => isUsableDocumentUrl(url) && /order|display_pdf|\.pdf|download|district-order/i.test(url))
          : [];
        return Array.from(new Set([...orderLinks, ...rawLinks]));
      }

      function getDistrictOrderLink(caseData, order) {
        if (caseData?.provider === 'districtCourtCnr' && order?.action) {
          return `/api/cases/${encodeURIComponent(caseData.id)}/district-order?action=${encodeURIComponent(JSON.stringify(order.action))}`;
        }
        if (isUsableDocumentUrl(order?.url)) {
          return order.url;
        }
        return order?.url || '';
      }

      function getDistrictCellLinks(caseData, cell) {
        const actionLinks = caseData?.provider === 'districtCourtCnr' && Array.isArray(cell?.actions)
          ? cell.actions.map((action) => `/api/cases/${encodeURIComponent(caseData.id)}/district-order?action=${encodeURIComponent(JSON.stringify(action))}`)
          : [];
        if (actionLinks.length) {
          return Array.from(new Set(actionLinks));
        }
        const directLinks = Array.isArray(cell?.links) ? cell.links.filter(isUsableDocumentUrl) : [];
        if (directLinks.length) {
          return Array.from(new Set(directLinks));
        }
        return Array.from(new Set(actionLinks));
      }

      function isUsableDocumentUrl(url) {
        const value = String(url || '').trim();
        return Boolean(value && value !== '#' && !value.endsWith('/#') && !value.endsWith('#') && /^(https?:\/\/|\/)/i.test(value));
      }

      function getDisplayTitle(caseData) {
        return caseData?.manualCaseTitle || caseData?.latestCaseTitle || caseData?.displayLabel || 'Case details';
      }

      function renderList(el, items, formatter, emptyText) {
        el.innerHTML = '';
        if (!items.length) {
          el.innerHTML = `<div class="item muted">${emptyText}</div>`;
          return;
        }
        for (const item of items) {
          const div = document.createElement('div');
          div.className = 'item';
          div.innerHTML = formatter(item);
          el.appendChild(div);
        }
      }

      function renderCase(caseData) {
        currentCase = caseData;

        document.title = `${caseData.latestCaseNumber || getDisplayTitle(caseData)} | CourtTrack`;
        document.getElementById('pageTitle').textContent = getDisplayTitle(caseData);
        document.getElementById('pageSubtitle').textContent = `${caseData.latestCaseNumber || caseData.caseLookup || '-'} | ${caseData.provider}`;
        document.getElementById('hearingDate').textContent = caseData.latestNextHearingDate || 'No hearing date yet';
        document.getElementById('hearingDate').title = formatDateSource(caseData.latestNextHearingDateSource);
        document.getElementById('caseTitle').textContent = getDisplayTitle(caseData);
        document.getElementById('caseNumber').textContent = caseData.latestCaseNumber || caseData.caseLookup || '-';
        document.getElementById('documentLinks').innerHTML = renderDocumentLinks(caseData);
        document.getElementById('manualCaseTitle').value = caseData.manualCaseTitle || '';
        document.getElementById('reminderEmails').value = caseData.reminderEmailsLabel || caseData.reminderEmail || DEFAULT_REMINDER_EMAIL;
        document.getElementById('reminderEnabled').checked = Boolean(caseData.reminderEnabled);
        document.getElementById('reminderDaysBefore').value = (caseData.reminderDaysBefore || [3, 2, 1, 0]).join(', ');
        document.getElementById('reminderSkipDisposed').checked = caseData.reminderSkipDisposed !== false;

        const metaGrid = document.getElementById('metaGrid');
        metaGrid.innerHTML = [
          ['Date source', formatDateSource(caseData.latestNextHearingDateSource)],
          ['Status-page date', escapeHtml(caseData.latestStatusPageNextHearingDate || '-')],
          ['Court', caseData.latestCourtName || '-'],
          ['Court number', caseData.latestCourtNumber || '-'],
          ['Status', `<span class="pill ${statusClass(caseData.latestStatus)}">${escapeHtml(caseData.latestStatus || '-')}</span>`],
          ['Official source', caseData.officialSourceUrl ? `<a href="${caseData.officialSourceUrl}" target="_blank" rel="noopener noreferrer">Open source</a>` : '-'],
          ['Case type / lookup', caseData.provider === 'districtCourtCnr'
            ? escapeHtml(caseData.displayLabel || '-')
            : (caseData.queryMeta?.caseType ? `${escapeHtml(caseData.queryMeta.caseType)} ${escapeHtml(caseData.queryMeta.caseNumber || '')}/${escapeHtml(caseData.queryMeta.year || '')}` : escapeHtml(caseData.displayLabel || '-'))],
          ['Manual case name', escapeHtml(caseData.manualCaseTitle || '-')],
          ['Reminder emails', escapeHtml(caseData.reminderEmailsLabel || 'Not configured')]
        ].map(([label, value]) => `<div class="meta"><strong>${label}</strong><div>${value}</div></div>`).join('');

        renderList(
          document.getElementById('eventsList'),
          caseData.events || [],
          (event) => `<time>${new Date(event.createdAt).toLocaleString()}</time><div>${escapeHtml(event.message)}</div>`,
          'No events recorded yet.'
        );

        renderCaseHistory(caseData);

        renderList(
          document.getElementById('runsList'),
          caseData.scrapeRuns || [],
          (run) => `<time>${new Date(run.createdAt).toLocaleString()}</time><div><span class="pill">${escapeHtml(run.status)}</span></div><p>${escapeHtml(run.message)}</p>`,
          'No sync runs yet.'
        );

        renderList(
          document.getElementById('reminderHistory'),
          caseData.reminderDeliveries || [],
          (delivery) => `
            <time>${new Date(delivery.createdAt).toLocaleString()}</time>
            <div><span class="pill">${escapeHtml(delivery.status)}</span></div>
            <p>${escapeHtml(delivery.email || '-')} ${delivery.kind ? `<span class="muted">(${escapeHtml(delivery.kind)})</span>` : ''}</p>
            <p class="muted">Days until hearing: ${escapeHtml(delivery.daysUntilHearing ?? '-')}</p>
            ${delivery.error ? `<p class="muted">${escapeHtml(delivery.error)}</p>` : ''}
          `,
          'No reminder emails have been attempted yet.'
        );

        const refreshBtn = document.getElementById('refreshBtn');
        const manualCaptcha = caseData.provider === 'delhiManualCaptcha' || caseData.provider === 'districtCourtCnr';
        refreshBtn.disabled = manualCaptcha;
        refreshBtn.textContent = manualCaptcha ? 'Refresh via home page CAPTCHA' : 'Refresh case';
      }

      function renderCaseHistory(caseData) {
        const el = document.getElementById('caseHistoryList');
        const toggleBtn = document.getElementById('historyToggleBtn');
        const history = caseData.latestCaseHistory || caseData.snapshots?.[0]?.payload?.caseHistory || {};
        const filings = Array.isArray(history.filings) ? history.filings : [];
        const listings = Array.isArray(history.listings) ? history.listings : [];
        const hearings = Array.isArray(history.hearings) ? history.hearings : [];
        const orders = Array.isArray(history.orders) ? history.orders : [];
        const rawTables = Array.isArray(history.rawTables) ? history.rawTables : [];
        const isDistrictCase = caseData.provider === 'districtCourtCnr';
        const hasExpandableHighCourtSections = !isDistrictCase && Boolean(filings.length || listings.length);
        let sectionsRendered = 0;

        el.innerHTML = '';
        toggleBtn.hidden = !hasExpandableHighCourtSections;
        toggleBtn.textContent = highCourtHistoryExpanded ? 'Show less' : 'Show more';
        if (!filings.length && !listings.length && !hearings.length && !orders.length && !rawTables.length) {
          el.innerHTML = '<div class="item muted">No case-history filings or listings have been parsed yet.</div>';
          return;
        }

        if (isDistrictCase && rawTables.length) {
          for (const table of rawTables) {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
              <h3>${escapeHtml(table.title || 'Case History')}</h3>
              ${renderRawHistoryTable(table)}
            `;
            el.appendChild(div);
            sectionsRendered += 1;
          }
          return;
        }

        if (filings.length && highCourtHistoryExpanded) {
          const div = document.createElement('div');
          div.className = 'item';
          div.innerHTML = `<h3>Filings</h3>${filings.slice(0, 10).map((filing) => `
            <p><strong>${escapeHtml(filing.date || '-')}</strong></p>
            <p>${escapeHtml(filing.details || '-')}</p>
            ${filing.diaryNumber ? `<p class="muted">Diary No: ${escapeHtml(filing.diaryNumber)}</p>` : ''}
          `).join('')}`;
          el.appendChild(div);
          sectionsRendered += 1;
        }

        if (hearings.length) {
          const div = document.createElement('div');
          div.className = 'item';
          div.innerHTML = `<h3>Hearing history</h3>${hearings.slice(0, 10).map((hearing) => `
            <p><strong>${escapeHtml(hearing.businessDate || hearing.nextDate || '-')}</strong></p>
            <p>${escapeHtml([hearing.purpose, hearing.business].filter(Boolean).join(' | ') || '-')}</p>
            ${hearing.judge ? `<p class="muted">${escapeHtml(hearing.judge)}</p>` : ''}
          `).join('')}`;
          el.appendChild(div);
          sectionsRendered += 1;
        }

        if (listings.length && highCourtHistoryExpanded) {
          const div = document.createElement('div');
          div.className = 'item';
          div.innerHTML = `<h3>Listings</h3>${listings.slice(0, 10).map((listing) => `
            <p><strong>${listing.orderUrl ? `<a href="${listing.orderUrl}" target="_blank" rel="noopener noreferrer">${escapeHtml(listing.date || '-')}</a>` : escapeHtml(listing.date || '-')}</strong></p>
            <p>${escapeHtml(listing.details || '-')}</p>
          `).join('')}`;
          el.appendChild(div);
          sectionsRendered += 1;
        }

        if (orders.length) {
          const div = document.createElement('div');
          div.className = 'item';
          div.innerHTML = `<h3>Orders</h3>${orders.slice(0, 10).map((order) => `
            <p><strong>${getDistrictOrderLink(caseData, order) ? `<a href="${getDistrictOrderLink(caseData, order)}" target="_blank" rel="noopener noreferrer">${escapeHtml(order.date || order.serialNumber || '-')}</a>` : escapeHtml(order.date || order.serialNumber || '-')}</strong></p>
            <p>${escapeHtml(order.details || '-')}</p>
          `).join('')}`;
          el.appendChild(div);
          sectionsRendered += 1;
        }

        if (!sectionsRendered && hasExpandableHighCourtSections && !highCourtHistoryExpanded) {
          el.innerHTML = '<div class="item muted">Filings and listings are hidden in the compact view. Click Show more to expand them.</div>';
        }
      }

      function renderRawHistoryTable(table) {
        const columns = Array.isArray(table.columns) && table.columns.length ? table.columns : [];
        const rows = Array.isArray(table.rows) ? table.rows : [];
        if (!columns.length || !rows.length) return '<p class="muted">No rows found.</p>';

        return `
          <table class="history-table">
            <thead><tr>${columns.map((column) => `<th>${escapeHtml(column)}</th>`).join('')}</tr></thead>
            <tbody>
              ${rows.map((row) => `<tr>${columns.map((column, index) => {
                const cell = row.cells?.[index] || {};
                return `<td>${renderHistoryCell(cell)}</td>`;
              }).join('')}</tr>`).join('')}
            </tbody>
          </table>
        `;
      }

      function renderHistoryCell(cell) {
        const text = escapeHtml(cell?.text || '-');
        const links = getDistrictCellLinks(currentCase, cell).filter(isUsableDocumentUrl);
        if (!links.length) return text;
        return `${text}<div class="muted">${links.map((url, index) => `<a href="${url}" target="_blank" rel="noopener noreferrer">PDF ${index + 1}</a>`).join(' | ')}</div>`;
      }

      async function loadReminderStatus() {
        reminderStatus = await api('/api/reminders/status');
        const text = reminderStatus.configured
          ? `SMTP is configured via ${reminderStatus.host}:${reminderStatus.port}. Scheduled reminders follow each case's days-before settings.`
          : 'SMTP is not configured yet. Save one or more emails now if you want, but reminders will only start sending after the SMTP env vars are set.';
        document.getElementById('reminderStatusText').textContent = text;
      }

      async function loadCase() {
        if (!caseId) {
          document.getElementById('pageTitle').textContent = 'Case not found';
          document.getElementById('pageSubtitle').textContent = 'No case id was provided.';
          return;
        }

        const caseData = await api(`/api/cases/${caseId}`);
        renderCase(caseData);
      }

      async function saveReminderSettings() {
        if (!currentCase) return;
        const reminderEmails = document.getElementById('reminderEmails').value.trim();
        const reminderEnabled = document.getElementById('reminderEnabled').checked;
        const reminderDaysBefore = parseReminderDaysBefore(document.getElementById('reminderDaysBefore').value);
        const response = await api(`/api/cases/${currentCase.id}/reminders`, {
          method: 'PATCH',
          body: JSON.stringify({
            reminderEmails,
            reminderEnabled: reminderEnabled && Boolean(reminderEmails),
            reminderDaysBefore,
            reminderSkipDisposed: document.getElementById('reminderSkipDisposed').checked
          })
        });
        setReminderFeedback(reminderEmails ? 'Reminder emails saved for this case.' : 'Reminder emails cleared for this case.', 'success');
        reminderStatus = response.reminderStatus;
        await loadCase();
      }

      async function saveCaseTitle() {
        if (!currentCase) return;
        const manualCaseTitle = document.getElementById('manualCaseTitle').value.trim();
        await api(`/api/cases/${currentCase.id}`, {
          method: 'PATCH',
          body: JSON.stringify({ manualCaseTitle })
        });
        setCaseTitleFeedback(manualCaseTitle ? 'Case name saved.' : 'Manual case name cleared.', 'success');
        await loadCase();
      }

      async function runReminderCheck() {
        const result = await api('/api/reminders/run', {
          method: 'POST',
          body: JSON.stringify({ caseId: currentCase?.id })
        });
        const sentCount = (result.results || []).filter((item) => item.sent).length;
        const caseResult = (result.results || []).find((item) => item.caseId === currentCase?.id);
        setReminderFeedback(
          result.skipped
            ? result.reason
            : caseResult
              ? caseResult.sent
                ? `Reminder sweep finished. Reminder emails were sent for this case.`
                : `Reminder sweep finished. ${formatSkippedReason(caseResult)}`
              : `Reminder sweep finished. ${sentCount} email${sentCount === 1 ? '' : 's'} sent.`,
          result.skipped ? 'error' : 'success'
        );
        renderSweepResults(result.results || []);
        await loadCase();
      }

      async function sendTestEmail() {
        if (!currentCase) return;
        const result = await api(`/api/cases/${currentCase.id}/reminders/test`, { method: 'POST' });
        setReminderFeedback(`Test email sent to ${result.email}.`, 'success');
        await loadCase();
      }

      async function forceSendReminder() {
        if (!currentCase) return;
        const result = await api('/api/reminders/run', {
          method: 'POST',
          body: JSON.stringify({ caseId: currentCase.id, forceSend: true })
        });
        const caseResult = (result.results || []).find((item) => item.caseId === currentCase.id);
        setReminderFeedback(
          caseResult?.sent ? `Forced reminder sent to ${caseResult.email}.` : `Force-send skipped. ${formatSkippedReason(caseResult || result)}`,
          caseResult?.sent ? 'success' : 'error'
        );
        renderSweepResults(result.results || []);
        await loadCase();
      }

      async function refreshCase() {
        if (!currentCase) return;
        if (currentCase.provider === 'delhiManualCaptcha' || currentCase.provider === 'districtCourtCnr') {
          window.location.href = '/';
          return;
        }
        await api(`/api/cases/${currentCase.id}/refresh`, { method: 'POST' });
        await loadCase();
      }

      async function deleteCase() {
        if (!currentCase) return;
        const deletePassword = window.prompt('Enter the delete password to remove this case.');
        if (deletePassword === null) return;
        await api(`/api/cases/${currentCase.id}`, {
          method: 'DELETE',
          body: JSON.stringify({ deletePassword })
        });
        window.location.href = '/';
      }

      document.getElementById('saveReminderBtn').addEventListener('click', () => {
        saveReminderSettings().catch((error) => setReminderFeedback(error.message, 'error'));
      });
      document.getElementById('saveCaseTitleBtn').addEventListener('click', () => {
        saveCaseTitle().catch((error) => setCaseTitleFeedback(error.message, 'error'));
      });
      document.getElementById('runReminderBtn').addEventListener('click', () => {
        runReminderCheck().catch((error) => setReminderFeedback(error.message, 'error'));
      });
      document.getElementById('testReminderBtn').addEventListener('click', () => {
        sendTestEmail().catch((error) => setReminderFeedback(error.message, 'error'));
      });
      document.getElementById('forceReminderBtn').addEventListener('click', () => {
        forceSendReminder().catch((error) => setReminderFeedback(error.message, 'error'));
      });
      document.getElementById('refreshBtn').addEventListener('click', () => {
        refreshCase().catch((error) => setReminderFeedback(error.message, 'error'));
      });
      document.getElementById('deleteBtn').addEventListener('click', () => {
        deleteCase().catch((error) => setReminderFeedback(error.message, 'error'));
      });
      document.getElementById('historyToggleBtn').addEventListener('click', () => {
        if (!currentCase || currentCase.provider === 'districtCourtCnr') return;
        highCourtHistoryExpanded = !highCourtHistoryExpanded;
        renderCaseHistory(currentCase);
      });
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        try {
          await fetch('/auth/logout', { method: 'POST' });
        } finally {
          window.location.href = '/login.html';
        }
      });

      Promise.all([loadReminderStatus(), loadCase()]).catch((error) => {
        setReminderFeedback(error.message, 'error');
      });

      function parseReminderDaysBefore(value) {
        return String(value || '')
          .split(/[\s,;]+/g)
          .map((day) => Number(day))
          .filter((day) => Number.isInteger(day) && day >= 0 && day <= 30);
      }

      function formatDateSource(source) {
        if (source === 'latest_order') return 'Latest order';
        if (source === 'case_status_page') return 'Delhi case-status page';
        if (source === 'ecourts_cnr') return 'eCourts CNR history';
        if (source === 'district_case_number') return 'District case-number page';
        return 'Date source unavailable';
      }

      function formatSkippedReason(item) {
        if (!item) return 'No result was returned.';
        const details = item.details || {};
        const parts = [item.reason || item.reasonCode || 'No action taken.'];
        if (details.hearingDate) parts.push(`Hearing date: ${details.hearingDate}.`);
        if (Array.isArray(details.reminderDaysBefore)) parts.push(`Reminder days: ${details.reminderDaysBefore.map((day) => `D-${day}`).join(', ')}.`);
        return parts.join(' ');
      }
    </script>
  </body>
</html>
