<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Case Details</title>
    <style>
      :root {
        --bg: #eef2f7;
        --panel: #ffffff;
        --ink: #132238;
        --muted: #66758f;
        --line: #d9e1ec;
        --accent: #0f62fe;
        --accent-soft: #e8f0ff;
        --success: #0c7a43;
        --danger: #b42318;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Georgia, "Times New Roman", serif; background:
        radial-gradient(circle at top left, rgba(15,98,254,.08), transparent 32%),
        linear-gradient(180deg, #f7f9fc 0%, var(--bg) 100%); color: var(--ink); }
      .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 20px 48px; }
      .topbar { display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:20px; }
      .brand { display:flex; align-items:center; gap:14px; }
      .brand-logo { width:66px; height:66px; object-fit:cover; border-radius:18px; box-shadow:0 14px 28px rgba(19,34,56,.12); }
      .eyebrow { letter-spacing:.08em; text-transform:uppercase; font-size:12px; color:var(--muted); margin-bottom:8px; }
      h1,h2,h3 { margin:0 0 10px; font-weight:600; }
      p { margin:0 0 10px; }
      .muted { color:var(--muted); }
      .grid { display:grid; grid-template-columns:1.3fr .7fr; gap:18px; }
      .stack { display:grid; gap:18px; }
      .card { background:rgba(255,255,255,.94); border:1px solid rgba(217,225,236,.9); border-radius:18px; padding:20px; box-shadow:0 18px 40px rgba(29,43,70,.08); }
      .big-date { font-size:38px; line-height:1; margin-bottom:10px; }
      .meta-grid { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:12px; margin-top:16px; }
      .meta { border:1px solid var(--line); border-radius:14px; padding:14px; background:#fbfcfe; }
      .meta strong { display:block; font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
      .toolbar, .row-actions { display:flex; gap:10px; flex-wrap:wrap; }
      button, input, textarea { width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--line); font:inherit; }
      textarea { min-height:108px; resize:vertical; }
      button { width:auto; cursor:pointer; color:white; background:linear-gradient(135deg, #0f62fe, #0043ce); border:none; }
      button.secondary { background:white; color:var(--accent); border:1px solid var(--line); }
      button.danger { background:#d92d20; }
      label { display:block; font-size:14px; color:var(--muted); margin-bottom:6px; }
      .form-row { display:grid; gap:12px; }
      .status { margin-top:12px; min-height:20px; color:var(--muted); }
      .status.success { color:var(--success); }
      .status.error { color:var(--danger); }
      .list { display:grid; gap:12px; }
      .item { border:1px solid var(--line); border-radius:14px; padding:14px; background:#fbfcfe; }
      .item time { display:block; color:var(--muted); font-size:13px; margin-bottom:6px; }
      .pill { display:inline-block; padding:4px 9px; border-radius:999px; font-size:12px; background:var(--accent-soft); color:var(--accent); }
      .pill.status-pending { background:#e7f8ef; color:#027a48; }
      .pill.status-disposed { background:#fdecec; color:#b42318; }
      a { color:var(--accent); }
      .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:14px; background:#fbfcfe; }
      table { width:100%; border-collapse:collapse; min-width:640px; }
      th, td { padding:10px; border-bottom:1px solid var(--line); text-align:left; vertical-align:top; font-size:14px; }
      .toggle-row { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
      @media (max-width: 900px) {
        .grid, .meta-grid { grid-template-columns:1fr; }
        .big-date { font-size:30px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="brand">
          <img src="/assets/logo.png" alt="Amit Gupta and Associates logo" class="brand-logo" />
          <div>
            <div class="eyebrow">CourtTrack</div>
            <h1 id="pageTitle">Case details</h1>
            <p class="muted" id="pageSubtitle">Loading case data...</p>
          </div>
        </div>
        <div class="toolbar">
          <button class="secondary" id="logoutBtn" type="button">Logout</button>
          <button class="secondary" onclick="window.location.href='/'">Back to home</button>
          <button class="secondary" id="refreshBtn" type="button">Refresh case</button>
          <button class="danger" id="deleteBtn" type="button">Delete case</button>
        </div>
      </div>

      <div class="grid">
        <div class="stack">
          <section class="card">
            <div class="eyebrow">Next hearing</div>
            <div class="big-date" id="hearingDate">-</div>
            <p id="caseTitle">Loading...</p>
            <p class="muted" id="caseNumber">-</p>
            <div class="meta-grid" id="metaGrid"></div>
          </section>

          <section class="card">
            <div class="toggle-row">
              <h2>Official documents</h2>
              <div id="documentLinks" class="muted">-</div>
            </div>
            <div class="list" id="orderItems" style="margin-top:14px;"></div>
          </section>

          <section class="card">
            <div class="toggle-row">
              <h2>Case history</h2>
              <button id="historyToggleBtn" class="secondary" type="button" style="display:none;">Show more</button>
            </div>
            <div id="historyContent" class="list"></div>
          </section>

          <section class="card">
            <h2>Events</h2>
            <div class="list" id="eventsList"></div>
          </section>

          <section class="card">
            <h2>Recent sync runs</h2>
            <div class="list" id="runsList"></div>
          </section>
        </div>

        <div class="stack">
          <section class="card">
            <h2>Case name</h2>
            <p class="muted">Use a manual label when the district site does not return a usable case title.</p>
            <div class="form-row" style="margin-top: 16px;">
              <div>
                <label for="manualCaseTitle">Manual case title</label>
                <input id="manualCaseTitle" placeholder="Enter a clearer case name" />
              </div>
              <button id="saveCaseTitleBtn" type="button">Save case title</button>
            </div>
            <div class="status" id="caseTitleFeedback"></div>
          </section>

          <section class="card">
            <h2>Email reminders</h2>
            <p class="muted" id="reminderStatusText">Loading reminder status...</p>
            <div class="form-row" style="margin-top: 16px;">
              <div>
                <label for="reminderEmails">Reminder emails</label>
                <textarea id="reminderEmails" placeholder="person1@example.com, person2@example.com"></textarea>
              </div>
              <div>
                <label for="reminderDaysBefore">Days before hearing</label>
                <input id="reminderDaysBefore" placeholder="3, 2, 1, 0" />
              </div>
              <label><input id="reminderEnabled" type="checkbox" style="width:auto; margin-right:8px;" />Enable reminders for this case</label>
              <label><input id="reminderSkipDisposed" type="checkbox" style="width:auto; margin-right:8px;" />Skip disposed cases</label>
              <div class="row-actions">
                <button id="saveReminderBtn" type="button">Save reminder settings</button>
                <button id="testReminderBtn" class="secondary" type="button">Send test email</button>
                <button id="runReminderBtn" class="secondary" type="button">Run reminder check now</button>
                <button id="forceReminderBtn" class="secondary" type="button">Force-send now</button>
              </div>
            </div>
            <div class="status" id="reminderFeedback"></div>
            <div class="list" id="reminderSweepResults" style="margin-top:14px;"></div>
          </section>

          <section class="card">
            <h2>Reminder history</h2>
            <div class="list" id="reminderHistory"></div>
          </section>
        </div>
      </div>
    </div>

    <script>
      const caseId = new URLSearchParams(window.location.search).get('id');
      let currentCase = null;
      let reminderStatus = null;
      let highCourtExpanded = false;

      async function api(url, options = {}) {
        const response = await fetch(url, {
          headers: { 'Content-Type': 'application/json' },
          ...options
        });
        if (response.status === 401) {
          window.location.href = `/login.html?next=${encodeURIComponent(window.location.pathname + window.location.search)}`;
          throw new Error('Authentication required.');
        }
        const data = await response.json();
        if (!response.ok) {
          const error = new Error(data.error || data.message || 'Request failed');
          Object.assign(error, data);
          throw error;
        }
        return data;
      }

      function setFeedback(id, message, cls = '') {
        const el = document.getElementById(id);
        el.className = `status ${cls}`.trim();
        el.textContent = message || '';
      }

      function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
      }

      function statusClass(status) {
        const value = String(status || '').toLowerCase();
        if (value.includes('disposed')) return 'status-disposed';
        if (value.includes('pending')) return 'status-pending';
        return '';
      }

      function dateSourceLabel(source) {
        if (source === 'district_case_number') return 'District details';
        if (source === 'case_status_page') return 'Status page';
        return source || '';
      }

      function renderDocumentLinks(caseData) {
        const links = [];
        if (caseData.latestOrdersUrl) links.push(`<a href="${caseData.latestOrdersUrl}" target="_blank" rel="noopener noreferrer">Orders</a>`);
        if (caseData.latestJudgmentsUrl) links.push(`<a href="${caseData.latestJudgmentsUrl}" target="_blank" rel="noopener noreferrer">Judgments</a>`);
        if (caseData.latestFilingsUrl) links.push(`<a href="${caseData.latestFilingsUrl}" target="_blank" rel="noopener noreferrer">Filings</a>`);
        if (caseData.latestListingsUrl) links.push(`<a href="${caseData.latestListingsUrl}" target="_blank" rel="noopener noreferrer">Listings</a>`);
        return links.length ? links.join(' | ') : '-';
      }

      function renderList(el, items, formatter, emptyText) {
        el.innerHTML = '';
        if (!items.length) {
          el.innerHTML = `<div class="item muted">${emptyText}</div>`;
          return;
        }
        for (const item of items) {
          const div = document.createElement('div');
          div.className = 'item';
          div.innerHTML = formatter(item);
          el.appendChild(div);
        }
      }

      function renderCase(caseData) {
        currentCase = caseData;
        document.title = `${displayCaseTitle(caseData)} | CourtTrack`;
        document.getElementById('pageTitle').textContent = displayCaseTitle(caseData);
        document.getElementById('pageSubtitle').textContent = `${escapeHtml(caseData.latestCaseNumber || caseData.displayLabel || '-')}` + ` | ${escapeHtml(caseData.provider)}`;
        document.getElementById('hearingDate').textContent = caseData.latestNextHearingDate || 'No hearing date yet';
        document.getElementById('caseTitle').textContent = displayCaseTitle(caseData);
        document.getElementById('caseNumber').textContent = caseData.latestCaseNumber || caseData.caseLookup || '-';
        document.getElementById('documentLinks').innerHTML = renderDocumentLinks(caseData);
        document.getElementById('manualCaseTitle').value = caseData.manualCaseTitle || '';

        document.getElementById('reminderEmails').value = caseData.reminderEmailsLabel || caseData.reminderEmail || '';
        document.getElementById('reminderEnabled').checked = Boolean(caseData.reminderEnabled);
        document.getElementById('reminderSkipDisposed').checked = caseData.reminderSkipDisposed !== false;
        document.getElementById('reminderDaysBefore').value = Array.isArray(caseData.reminderDaysBefore) ? caseData.reminderDaysBefore.join(', ') : '3, 2, 1, 0';

        const metaGrid = document.getElementById('metaGrid');
        metaGrid.innerHTML = [
          ['Court', caseData.latestCourtName || '-'],
          ['Court number', caseData.latestCourtNumber || '-'],
          ['Status', `<span class="pill ${statusClass(caseData.latestStatus)}">${escapeHtml(caseData.latestStatus || '-')}</span>`],
          ['Date source', escapeHtml(dateSourceLabel(caseData.latestNextHearingDateSource) || '-')],
          ['Official source', caseData.officialSourceUrl ? `<a href="${caseData.officialSourceUrl}" target="_blank" rel="noopener noreferrer">Open source</a>` : '-'],
          ['Reminder emails', escapeHtml(caseData.reminderEmailsLabel || 'Not configured')]
        ].map(([label, value]) => `<div class="meta"><strong>${label}</strong><div>${value}</div></div>`).join('');

        const orders = caseData.latestCaseHistory?.orders || [];
        renderList(
          document.getElementById('orderItems'),
          orders,
          (order) => `
            <div><strong>${escapeHtml(order.details || `Order ${order.serialNumber || ''}`)}</strong></div>
            <p class="muted">${escapeHtml(order.date || '-')}</p>
            <p>${order.url ? `<a href="${order.url}" target="_blank" rel="noopener noreferrer">Open order</a>` : 'No direct order link saved.'}</p>
          `,
          'No order rows are stored for this case yet.'
        );

        renderHistory(caseData);

        renderList(
          document.getElementById('eventsList'),
          caseData.events || [],
          (event) => `<time>${new Date(event.createdAt).toLocaleString()}</time><div>${escapeHtml(event.message)}</div>`,
          'No events recorded yet.'
        );

        renderList(
          document.getElementById('runsList'),
          caseData.scrapeRuns || [],
          (run) => `<time>${new Date(run.createdAt).toLocaleString()}</time><div><span class="pill">${escapeHtml(run.status)}</span></div><p>${escapeHtml(run.message)}</p>`,
          'No sync runs yet.'
        );

        renderList(
          document.getElementById('reminderHistory'),
          caseData.reminderDeliveries || [],
          (delivery) => `
            <time>${new Date(delivery.createdAt).toLocaleString()}</time>
            <div><span class="pill">${escapeHtml(delivery.status)}</span></div>
            <p>${escapeHtml(delivery.email || '-')}</p>
            <p class="muted">Days until hearing: ${escapeHtml(delivery.daysUntilHearing ?? '-')}</p>
            ${delivery.kind ? `<p class="muted">Type: ${escapeHtml(delivery.kind)}</p>` : ''}
            ${delivery.error ? `<p class="muted">${escapeHtml(delivery.error)}</p>` : ''}
          `,
          'No reminder emails have been attempted yet.'
        );

        const refreshBtn = document.getElementById('refreshBtn');
        refreshBtn.disabled = caseData.provider === 'delhiManualCaptcha' || caseData.provider === 'districtCourtCnr';
        refreshBtn.textContent = refreshBtn.disabled ? 'Refresh via home page CAPTCHA' : 'Refresh case';
      }

      function renderHistory(caseData) {
        const history = caseData.latestCaseHistory || { filings: [], listings: [], hearings: [], orders: [], rawTables: [] };
        const historyContent = document.getElementById('historyContent');
        const toggleBtn = document.getElementById('historyToggleBtn');

        if (caseData.provider === 'districtCourtCnr') {
          toggleBtn.style.display = 'none';
          const tables = history.rawTables || [];
          if (!tables.length) {
            historyContent.innerHTML = `<div class="item muted">No district history tables are saved for this case yet.</div>`;
            return;
          }
          historyContent.innerHTML = tables.map((table) => renderRawTable(table)).join('');
          return;
        }

        const hasExtra = (history.filings || []).length || (history.listings || []).length;
        toggleBtn.style.display = hasExtra ? 'inline-flex' : 'none';
        toggleBtn.textContent = highCourtExpanded ? 'Show less' : 'Show more';

        const sections = [];
        sections.push(renderSimpleSection('Hearings', history.hearings || [], (item) => `
          <div><strong>${escapeHtml(item.purpose || item.details || 'Hearing')}</strong></div>
          <p class="muted">${escapeHtml(item.nextDate || item.date || item.businessDate || '-')}</p>
          ${item.judge ? `<p>${escapeHtml(item.judge)}</p>` : ''}
        `, 'No hearing entries saved yet.'));

        if (highCourtExpanded) {
          sections.push(renderSimpleSection('Filings', history.filings || [], (item) => `
            <div><strong>${escapeHtml(item.details || 'Filing')}</strong></div>
            <p class="muted">${escapeHtml(item.date || '-')}</p>
            ${item.diaryNumber ? `<p>Diary No: ${escapeHtml(item.diaryNumber)}</p>` : ''}
            ${item.status ? `<p>Status: ${escapeHtml(item.status)}</p>` : ''}
          `, 'No filing entries saved yet.'));

          sections.push(renderSimpleSection('Listings', history.listings || [], (item) => `
            <div><strong>${escapeHtml(item.details || 'Listing')}</strong></div>
            <p class="muted">${escapeHtml(item.date || '-')}</p>
            ${item.orderUrl ? `<p><a href="${item.orderUrl}" target="_blank" rel="noopener noreferrer">Listing order</a></p>` : ''}
          `, 'No listing entries saved yet.'));
        }

        historyContent.innerHTML = sections.join('');
      }

      function renderSimpleSection(title, items, formatter, emptyText) {
        const body = items.length
          ? items.map((item) => `<div class="item">${formatter(item)}</div>`).join('')
          : `<div class="item muted">${emptyText}</div>`;
        return `<div><h3>${escapeHtml(title)}</h3><div class="list">${body}</div></div>`;
      }

      function renderRawTable(table) {
        const columns = table.columns || [];
        const rows = table.rows || [];
        return `
          <div>
            <h3>${escapeHtml(table.title || 'Details')}</h3>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>${columns.map((column) => `<th>${escapeHtml(column)}</th>`).join('')}</tr>
                </thead>
                <tbody>
                  ${rows.map((row) => `
                    <tr>
                      ${(row.cells || []).map((cell) => {
                        const link = cell.links && cell.links[0] ? `<br><a href="${cell.links[0]}" target="_blank" rel="noopener noreferrer">Open link</a>` : '';
                        return `<td>${escapeHtml(cell.text || '-')} ${link}</td>`;
                      }).join('')}
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      function renderSweepResults(results) {
        const el = document.getElementById('reminderSweepResults');
        if (!results || !results.length) {
          el.innerHTML = '';
          return;
        }

        el.innerHTML = '';
        for (const item of results) {
          const div = document.createElement('div');
          div.className = 'item';
          div.innerHTML = `
            <div><strong>${escapeHtml(item.caseNumber || item.caseId || 'Case')}</strong></div>
            <p>${item.sent ? `Email sent to ${escapeHtml(item.email || '-')}` : escapeHtml(item.reason || 'No action taken.')}</p>
            ${item.reasonCode ? `<p class="muted">Reason: ${escapeHtml(item.reasonCode)}</p>` : ''}
            ${item.details ? `<p class="muted">${escapeHtml(JSON.stringify(item.details))}</p>` : ''}
          `;
          el.appendChild(div);
        }
      }

      function displayCaseTitle(caseData) {
        return caseData.manualCaseTitle || caseData.latestCaseTitle || caseData.displayLabel || caseData.latestCaseNumber || 'Tracked case';
      }

      async function loadReminderStatus() {
        reminderStatus = await api('/api/reminders/status');
        const text = reminderStatus.configured
          ? `SMTP is configured via ${reminderStatus.host}:${reminderStatus.port}.`
          : 'SMTP is not configured yet. You can still save reminder preferences now.';
        document.getElementById('reminderStatusText').textContent = text;
      }

      async function loadCase() {
        if (!caseId) {
          document.getElementById('pageTitle').textContent = 'Case not found';
          document.getElementById('pageSubtitle').textContent = 'No case id was provided.';
          return;
        }
        const caseData = await api(`/api/cases/${caseId}`);
        renderCase(caseData);
      }

      async function saveCaseTitle() {
        if (!currentCase) return;
        const manualCaseTitle = document.getElementById('manualCaseTitle').value.trim();
        await api(`/api/cases/${currentCase.id}`, {
          method: 'PATCH',
          body: JSON.stringify({ manualCaseTitle })
        });
        setFeedback('caseTitleFeedback', manualCaseTitle ? 'Manual case title saved.' : 'Manual case title cleared.', 'success');
        await loadCase();
      }

      async function saveReminderSettings() {
        if (!currentCase) return;
        const reminderEmails = document.getElementById('reminderEmails').value.trim();
        const reminderEnabled = document.getElementById('reminderEnabled').checked;
        const reminderSkipDisposed = document.getElementById('reminderSkipDisposed').checked;
        const reminderDaysBefore = document.getElementById('reminderDaysBefore').value
          .split(',')
          .map((value) => Number(value.trim()))
          .filter((value) => Number.isFinite(value));

        await api(`/api/cases/${currentCase.id}/reminders`, {
          method: 'PATCH',
          body: JSON.stringify({
            reminderEmails,
            reminderEnabled,
            reminderSkipDisposed,
            reminderDaysBefore
          })
        });
        setFeedback('reminderFeedback', 'Reminder settings saved for this case.', 'success');
        await loadCase();
      }

      async function runReminderCheck(forceSend = false) {
        const result = await api('/api/reminders/run', {
          method: 'POST',
          body: JSON.stringify({
            caseId: currentCase?.id,
            forceSend
          })
        });
        const caseResult = (result.results || []).find((item) => item.caseId === currentCase?.id);
        setFeedback(
          'reminderFeedback',
          caseResult
            ? (caseResult.sent ? 'Reminder email sent for this case.' : caseResult.reason || 'No reminder was sent.')
            : (result.reason || 'Reminder sweep finished.'),
          caseResult?.sent ? 'success' : (result.skipped ? 'error' : 'success')
        );
        renderSweepResults(result.results || []);
        await loadCase();
      }

      async function sendTestEmail() {
        if (!currentCase) return;
        const result = await api(`/api/cases/${currentCase.id}/reminders/test`, { method: 'POST' });
        setFeedback('reminderFeedback', `Test email sent to ${result.email}.`, 'success');
        await loadCase();
      }

      async function refreshCase() {
        if (!currentCase) return;
        if (currentCase.provider === 'delhiManualCaptcha' || currentCase.provider === 'districtCourtCnr') {
          window.location.href = '/';
          return;
        }
        await api(`/api/cases/${currentCase.id}/refresh`, { method: 'POST' });
        await loadCase();
      }

      async function verifyDeletePassword() {
        const password = window.prompt('Enter your account password to delete this case:');
        if (password === null) return false;
        await api('/auth/verify-password', {
          method: 'POST',
          body: JSON.stringify({ password })
        });
        return true;
      }

      async function deleteCase() {
        if (!currentCase) return;
        const allowed = await verifyDeletePassword();
        if (!allowed) return;
        await api(`/api/cases/${currentCase.id}`, { method: 'DELETE' });
        window.location.href = '/';
      }

      document.getElementById('saveCaseTitleBtn').addEventListener('click', () => {
        saveCaseTitle().catch((error) => setFeedback('caseTitleFeedback', error.message, 'error'));
      });
      document.getElementById('saveReminderBtn').addEventListener('click', () => {
        saveReminderSettings().catch((error) => setFeedback('reminderFeedback', error.message, 'error'));
      });
      document.getElementById('runReminderBtn').addEventListener('click', () => {
        runReminderCheck(false).catch((error) => setFeedback('reminderFeedback', error.message, 'error'));
      });
      document.getElementById('forceReminderBtn').addEventListener('click', () => {
        runReminderCheck(true).catch((error) => setFeedback('reminderFeedback', error.message, 'error'));
      });
      document.getElementById('testReminderBtn').addEventListener('click', () => {
        sendTestEmail().catch((error) => setFeedback('reminderFeedback', error.message, 'error'));
      });
      document.getElementById('refreshBtn').addEventListener('click', () => {
        refreshCase().catch((error) => setFeedback('reminderFeedback', error.message, 'error'));
      });
      document.getElementById('deleteBtn').addEventListener('click', () => {
        deleteCase().catch((error) => setFeedback('reminderFeedback', error.message, 'error'));
      });
      document.getElementById('logoutBtn').addEventListener('click', async () => {
        try {
          await fetch('/auth/logout', { method: 'POST' });
        } finally {
          window.location.href = '/login.html';
        }
      });
      document.getElementById('historyToggleBtn').addEventListener('click', () => {
        highCourtExpanded = !highCourtExpanded;
        renderHistory(currentCase);
      });

      Promise.all([loadReminderStatus(), loadCase()]).catch((error) => {
        setFeedback('reminderFeedback', error.message, 'error');
      });
    </script>
  </body>
</html>
